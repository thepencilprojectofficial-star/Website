  <text x="190" y="125" fill="#16204a" font-family="Georgia, serif" font-size="48" font-weight="700">The Pencil Project</text>
  <text x="72" y="278" fill="#16204a" font-family="Georgia, serif" font-size="78" font-weight="800">Every kid deserves</text>
  <text x="72" y="365" fill="#2f4bd1" font-family="Georgia, serif" font-size="78" font-style="italic" font-weight="800">a full pencil case.</text>
  <text x="76" y="445" fill="#54607e" font-family="Arial, sans-serif" font-size="33">Student-run school supply drives in Austin, Texas</text>
  <text x="76" y="560" fill="#16204a" font-family="Arial, sans-serif" font-size="30" font-weight="700">thepencilproject.org</text>
</svg>
